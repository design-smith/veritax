# Render Blueprint — one-click backend deploy. In Render: New → Blueprint → connect this repo.
# All secrets are sync:false, so you enter them in the dashboard (nothing sensitive lives in the repo).
services:
  - type: web
    name: veritax-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL       # Supabase Session-pooler URL, scheme postgresql+asyncpg://
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: CORS_ORIGINS       # your Vercel origin(s), comma-separated, no trailing slash
        sync: false
    # No object storage needed: uploads are stored on the local disk and only read once during
    # embedding. To use S3/R2 instead, add S3_ENDPOINT_URL + S3_ACCESS_KEY/S3_SECRET_KEY/S3_BUCKET/S3_REGION.
