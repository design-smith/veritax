# Local dev infra. Requires the Docker Compose plugin; if you don't have it, see README for the
# equivalent `docker run` commands.
services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

  # Optional: a local pgvector Postgres for dev if you aren't providing your own.
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: veritax
      POSTGRES_PASSWORD: veritax
      POSTGRES_DB: veritax
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  minio_data:
  pg_data:
